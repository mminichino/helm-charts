apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-insight
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: redis-insight
  template:
    metadata:
      labels:
        app: redis-insight
    spec:
      initContainers:
        - name: init
          image: busybox
          command:
            - /bin/sh
            - '-c'
            - |
              chown -R 1000 /data
          resources: {}
          volumeMounts:
            - name: redis-insight-data
              mountPath: /data
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
      containers:
        - name: redis-insight
          image: "{{ .Values.registry }}/{{ .Values.repository }}/{{ .Values.image }}:{{ .Values.tag }}"
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: {{ .Values.port }}
              protocol: TCP
          volumeMounts:
            - name: redis-insight-data
              mountPath: /data
          {{- if .Values.tls }}
          {{- $host := list }}
          {{- if .Values.dns.domain }}
          {{- $domain := .Values.dns.domain }}
          {{- $name := printf "redis-insight.%s" $domain }}
          {{- $host = append $host $name }}
          {{- end }}
          {{- $cert := genSelfSignedCert "redis-insight" nil $host 365 }}
          env:
            - name: RI_SERVER_TLS_CERT
              value: {{ $cert.Cert | quote }}
            - name: RI_SERVER_TLS_KEY
              value: {{ $cert.Key | quote }}
          {{- end }}
      volumes:
        - name: redis-insight-data
          persistentVolumeClaim:
            claimName: redis-insight-data-pvc
