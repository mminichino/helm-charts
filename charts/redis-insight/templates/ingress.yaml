{{- if and .Values.ingress.enabled .Values.dns.domain }}
{{- if or (eq .Values.ingress.type "nginx") (eq .Values.ingress.type "haproxy") }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: redis-insight
  namespace: {{ .Release.Namespace }}
  {{- if eq .Values.ingress.type "haproxy" }}
  annotations:
    kubernetes.io/ingress.class: haproxy
    haproxy.org/auth-type: basic-auth
    haproxy.org/auth-secret: "{{ .Release.Namespace }}/redis-insight-credentials"
    haproxy.org/auth-realm: "Authentication Required"
    {{- if .Values.tls }}
    ingress.kubernetes.io/ssl-passthrough: "true"
    {{- end }}
  {{- else }}
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: redis-insight-credentials
    nginx.ingress.kubernetes.io/auth-realm: 'Authentication Required'
    {{- if .Values.tls }}
    nginx.ingress.kubernetes.io/ssl-passthrough: "true"
    nginx.ingress.kubernetes.io/backend-protocol: HTTPS
    {{- end }}
  {{- end }}
spec:
  rules:
    - host: "redis-insight.{{ .Values.dns.domain }}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: redis-insight
                port:
                  number: {{ .Values.port }}
{{- end }}
{{- end }}
