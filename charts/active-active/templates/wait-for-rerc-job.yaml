apiVersion: batch/v1
kind: Job
metadata:
  name: reaadb-wait-for-rerc
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    spec:
      serviceAccountName: redis-enterprise-operator
      containers:
        - name: wait-for-rerc
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for RERC {{ .Values.localName }} to be Active..."
              kubectl wait --for=jsonpath='{.status.status}'=Active redisenterpriseremotecluster/{{ .Values.localName }} --timeout=300s -n {{ .Values.namespace | default .Release.Namespace }}
              echo "Waiting for RERC {{ .Values.remoteName }} to be Active..."
              kubectl wait --for=jsonpath='{.status.status}'=Active redisenterpriseremotecluster/{{ .Values.remoteName }} --timeout=300s -n {{ .Values.namespace | default .Release.Namespace }}
      restartPolicy: OnFailure
  backoffLimit: 3
