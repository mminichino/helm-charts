apiVersion: v1
kind: ServiceAccount
metadata:
  name: "{{ .Values.name }}-wait-for-secrets"
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-2"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: "{{ .Values.name }}-wait-for-secrets"
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-2"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: "{{ .Values.name }}-wait-for-secrets"
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-2"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
subjects:
- kind: ServiceAccount
  name: "{{ .Values.name }}-wait-for-secrets"
  namespace: {{ .Values.namespace | default .Release.Namespace }}
roleRef:
  kind: Role
  name: "{{ .Values.name }}-wait-for-secrets"
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ .Values.name }}-wait-for-secrets"
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    spec:
      serviceAccountName: "{{ .Values.name }}-wait-for-secrets"
      containers:
      - name: wait-for-secrets
        image: docker.io/bitnami/kubectl:latest
        command:
        - /bin/bash
        - -c
        - |
          set -e
          SECRETS=(
            "{{ .Values.name }}-secret"
            "redis-enterprise-{{ .Values.localName }}"
            "redis-enterprise-{{ .Values.remoteName }}"
          )
          for secret in "${SECRETS[@]}"; do
            echo "Waiting for secret $secret to be created..."
            until kubectl get secret "$secret" -n {{ .Values.namespace | default .Release.Namespace }} > /dev/null 2>&1; do
              echo "Still waiting for $secret..."
              sleep 2
            done
            echo "Secret $secret found!"
          done
          sleep 2
      restartPolicy: OnFailure
  backoffLimit: 10
