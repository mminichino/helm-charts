{{- if .Values.mcp.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cs.fullname" . }}-mcp
  labels:
    {{- include "cs.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
spec:
  replicas: {{ .Values.mcp.replicaCount }}
  selector:
    matchLabels:
      {{- include "cs.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mcp
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "cs.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mcp
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "cs.serviceAccountName" . }}
      containers:
        - name: mcp
          {{- $repository := .Values.mcp.image.repository }}
          {{- if .Values.mcp.image.prefix }}
          {{- $repository = printf "%s/%s" .Values.mcp.image.prefix .Values.mcp.image.repository }}
          {{- end }}
          image: "{{ .Values.mcp.image.registry }}/{{ $repository }}/{{ .Values.mcp.image.name }}:{{ .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.mcp.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "cs.fullname" . }}-config
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cs.configSecretName" . }}
                  key: REDIS_PASSWORD
            - name: SECRET_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "cs.configSecretName" . }}
                  key: SECRET_ENCRYPTION_KEY
            {{- if or .Values.license.existingSecret .Values.license.key }}
            - name: LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "cs.licenseSecretName" . }}
                  key: LICENSE_KEY
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.mcp.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

